<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDC.IO Image Review</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
h1 { text-align: center; margin-bottom: 8px; font-size: 22px; }
.stats { text-align: center; color: #8b949e; margin-bottom: 20px; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; max-width: 1600px; margin: 0 auto; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
.card.approved { border-color: #3fb950; }
.card.denied { border-color: #f85149; }
.card-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
.card-header .name { font-weight: 600; font-size: 14px; }
.card-header .meta { font-size: 11px; color: #8b949e; }
.images { display: flex; gap: 0; }
.images .col { flex: 1; text-align: center; padding: 8px; }
.images .col:first-child { border-right: 1px solid #30363d; }
.images img { max-width: 100%; max-height: 160px; object-fit: contain; border-radius: 4px; }
.images .label { font-size: 10px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
.actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #30363d; }
.actions button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.2s; }
.actions .approve { background: #238636; color: #fff; }
.actions .approve:hover { opacity: 0.85; }
.actions .approve.active { outline: 2px solid #3fb950; outline-offset: -2px; }
.actions .deny { background: #da3633; color: #fff; }
.actions .deny:hover { opacity: 0.85; }
.actions .deny.active { outline: 2px solid #f85149; outline-offset: -2px; }
.rarity-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.toolbar { text-align: center; margin: 20px 0; position: sticky; top: 0; background: #0d1117; padding: 12px 0; z-index: 10; border-bottom: 1px solid #30363d; }
.toolbar button { padding: 10px 24px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; margin: 0 6px; }
.toolbar .apply-btn { background: #238636; color: #fff; }
.toolbar .apply-btn:hover { opacity: 0.85; }
.toolbar .approve-all { background: #1f6feb; color: #fff; }
.toolbar .deny-all { background: #6e7681; color: #fff; }
.source-badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; }
.source-badge.minimax { background: #1f6feb33; color: #58a6ff; }
.source-badge.cf { background: #f0883e33; color: #f0883e; }
</style>
</head>
<body>
<h1>SDC.IO Item Image Review</h1>
<div class="stats" id="stats"></div>
<div class="toolbar">
  <button class="approve-all" onclick="setAll('approved')">✓ Approve All</button>
  <button class="deny-all" onclick="setAll('denied')">✕ Deny All</button>
  <button class="apply-btn" onclick="applyChanges()">Apply Approved Changes</button>
</div>
<div class="grid" id="grid"></div>
<script>
const RARITY_COLORS = {white:'#eceff1',gray:'#9e9e9e',green:'#81c784',blue:'#64b5f6',purple:'#b388ff',gold:'#ffca28'};
const decisions = {};

async function load() {
  const resp = await fetch('/api/image-review-data');
  const items = await resp.json();
  const grid = document.getElementById('grid');
  const minimax = items.filter(i => i.source === 'MiniMax').length;
  const cf = items.filter(i => i.source === 'CF FLUX').length;
  document.getElementById('stats').textContent = `${items.length} items · ${minimax} MiniMax · ${cf} CF FLUX`;
  
  grid.innerHTML = items.map(item => {
    const color = RARITY_COLORS[item.rarity] || '#999';
    const sourceClass = item.source === 'MiniMax' ? 'minimax' : 'cf';
    return `
    <div class="card" id="card-${item.id}">
      <div class="card-header">
        <div><span class="rarity-dot" style="background:${color}"></span><span class="name">${item.name}</span></div>
        <div class="meta">${item.rarity} · <span class="source-badge ${sourceClass}">${item.source}</span></div>
      </div>
      <div class="images">
        <div class="col"><div class="label">Original</div><img src="/assets/items/${item.id}.png" onerror="this.src='/assets/items/${item.id}.jpg'" loading="lazy"></div>
        <div class="col"><div class="label">Generated</div><img src="/assets/items/${item.file}" loading="lazy"></div>
      </div>
      <div class="actions">
        <button class="approve" onclick="decide('${item.id}','approved',this)">✓ Approve</button>
        <button class="deny" onclick="decide('${item.id}','denied',this)">✕ Deny</button>
      </div>
    </div>`;
  }).join('');
}

function decide(id, choice, btn) {
  decisions[id] = choice;
  const card = document.getElementById('card-' + id);
  card.className = 'card ' + choice;
  const btns = card.querySelectorAll('.actions button');
  btns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setAll(choice) {
  document.querySelectorAll('.card').forEach(card => {
    const id = card.id.replace('card-', '');
    const btn = card.querySelector(choice === 'approved' ? '.approve' : '.deny');
    decide(id, choice, btn);
  });
}

async function applyChanges() {
  const approved = Object.entries(decisions).filter(([,v]) => v === 'approved').map(([k]) => k);
  const denied = Object.entries(decisions).filter(([,v]) => v === 'denied').map(([k]) => k);
  if (approved.length === 0 && denied.length === 0) { alert('No decisions made yet.'); return; }
  if (!confirm(`Apply changes?\n${approved.length} approved (will replace originals)\n${denied.length} denied (will be deleted)`)) return;
  const resp = await fetch('/api/image-review-apply', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({approved, denied})
  });
  const result = await resp.json();
  alert(result.message || 'Done');
  if (result.ok) location.reload();
}

load();
</script>
</body>
</html>
